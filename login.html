<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | GreenScape</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="icon" type="image/png" href="assets/favicon/favicon.png">
    <link rel="apple-touch-icon" href="assets/favicon/favicon.png">
</head>

<body class="auth-page">

    <div>
        <div class="auth-wrapper fade-in">
            <a href="index.html" class="logo auth-logo">
                <i class="fas fa-leaf"></i>
                <span>GreenScape</span>
            </a>

            <h2 class="mb-10" style="font-size: 1.5rem;">Welcome Back</h2>
            <p class="mb-15" style="font-size: 0.9rem;">Please enter your credentials to access your secure client
                portal.</p>

            <form id="loginForm">
                <div class="form-group-auth">
                    <label for="login-email">Email Address</label>
                    <input type="email" id="login-email" required placeholder="name@example.com">
                </div>
                <div class="form-group-auth">
                    <label for="login-password">Password</label>
                    <div class="password-group">
                        <input type="password" id="login-password" required placeholder="••••••••">
                        <button type="button" class="password-toggle" data-target="login-password">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
                    <label style="display: flex; align-items: center; gap: 8px; font-size: 0.9rem; cursor: pointer;">
                        <input type="checkbox"> Remember me
                    </label>
                    <a href="#" style="font-size: 0.9rem; color: var(--primary); font-weight: 500;">Forgot Password?</a>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; padding: 15px;">Login</button>
            </form>

            <p style="margin-top: 20px; font-size: 0.9rem;">
                Don't have an account? <a href="signup.html" style="color: var(--primary); font-weight: 600;">Sign
                    Up</a>
            </p>

            <div class="social-login">
                <div class="auth-sep" style="margin: 20px 0;">OR</div>
                <div class="social-btns">
                    <a href="#" class="btn-social btn-google">
                        <svg width="20" height="20" viewBox="0 0 24 24">
                            <path
                                d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                                fill="#4285F4" />
                            <path
                                d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                                fill="#34A853" />
                            <path
                                d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
                                fill="#FBBC05" />
                            <path
                                d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                                fill="#EA4335" />
                        </svg> Google
                    </a>
                    <a href="#" class="btn-social btn-facebook">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="#1877F2">
                            <path
                                d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953h-1.513c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z" />
                        </svg> Facebook
                    </a>
                </div>
            </div>

            <a href="index.html" class="back-home"><i class="fas fa-arrow-left"></i> Back to Home</a>
        </div>

        <script src="js/main.js"></script>
</body>

</html>
